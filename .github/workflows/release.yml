name: Compile crosspointTH Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Tag or commit to build and validate
        required: true
        default: v1.4.1-th.1

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ inputs.release_ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Verify upstream hardware safety baseline
        run: bash scripts/check_release_safety.sh

      - name: Build crosspointTH app image
        run: pio run -e gh_release

      - name: Prepare app-only release files
        run: |
          cp .pio/build/gh_release/firmware.bin crosspointTH-firmware.bin
          sha256sum crosspointTH-firmware.bin > SHA256SUMS.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crosspointTH-${{ inputs.release_ref || github.ref_name }}
          path: |
            crosspointTH-firmware.bin
            SHA256SUMS.txt
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
