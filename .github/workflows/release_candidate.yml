name: Compile crosspointTH Release Candidate

on:
  workflow_dispatch:

jobs:
  build-release-candidate:
    if: startsWith(github.ref_name, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Verify upstream hardware safety baseline
        run: bash scripts/check_release_safety.sh

      - name: Extract env
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BRANCH_SUFFIX=${GITHUB_REF_NAME#release/}" >> $GITHUB_ENV

      - name: Build crosspointTH release candidate app image
        env:
          CROSSPOINT_RC_HASH: ${{ env.SHORT_SHA }}
        run: pio run -e gh_release_rc

      - name: Prepare app-only release files
        run: |
          cp .pio/build/gh_release_rc/firmware.bin crosspointTH-firmware-rc.bin
          sha256sum crosspointTH-firmware-rc.bin > SHA256SUMS.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crosspointTH-RC-${{ env.BRANCH_SUFFIX }}
          path: |
            crosspointTH-firmware-rc.bin
            SHA256SUMS.txt
            .pio/build/gh_release_rc/firmware.elf
            .pio/build/gh_release_rc/firmware.map
